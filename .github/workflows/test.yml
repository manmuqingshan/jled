---
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
name: run tests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: install cpplint
        run: pip install cpplint==2.0.2
      - name: linter
        run: make lint
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - name: install python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: install tools
        uses: ./.github/actions/setup-platformio
        with:
          install-gcovr: 'true'
      - name: run tests
        run: |
          cd test
          make clean test OPT=-O2
          make clean coverage OPT=-O0
      - name: Upload coverage to coveralls
        uses: coverallsapp/github-action@v2.3.6
        with:
          github-token: ${{ secrets.github_token }}
          file: test/coverage.json
          git-commit: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: test/report/
  examples:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: uno
          - board: esp01
          - board: nano33ble
          - board: esp32dev
            extra_flags: --project-option="build_flags = -DLED_BUILTIN=1"
          - board: rpipico
            extra_flags: --project-option="board_build.core = earlephilhower"
    steps:
      - name: checkout code
        uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pio-board
        with:
          board: ${{ matrix.board }}
      - name: build examples
        shell: bash
        run: |-
          passed=(); failed=()
          for example in $(find examples -maxdepth 2 -name '*.ino' -printf '%P\n' | cut -d/ -f1 | sort -u); do
            extra_opts=()
            [[ "$example" == "morse" ]] && extra_opts+=(--lib=examples/morse)
            [[ "$example" == "last_brightness" ]] && extra_opts+=(--project-option 'lib_deps = arduinogetstarted/ezButton@1.0.6')
            echo "::group::$example"
            if pio ci --board="${{ matrix.board }}" --lib="src" \
                "${extra_opts[@]}" ${{ matrix.extra_flags }} \
                "examples/${example}/${example}.ino"; then
              passed+=("$example")
            else
              echo "::error title=${{ matrix.board }}/$example::build failed"
              failed+=("$example")
            fi
            echo "::endgroup::"
          done
          {
            echo "### \`${{ matrix.board }}\`"
            echo "| example | status |"
            echo "|---------|--------|"
            for e in "${passed[@]}"; do echo "| \`$e\` | ✅ |"; done
            for e in "${failed[@]}"; do echo "| \`$e\` | ❌ |"; done
          } >> "$GITHUB_STEP_SUMMARY"
          [[ ${#failed[@]} -eq 0 ]] || { echo "${#failed[@]} failed: ${failed[*]}"; exit 1; }
